name: cd

on:
  push:
    branches: [main]

jobs:
   deploy:
    name: Deploy 
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"
      - name: Check out code
        uses: actions/checkout@v4
      - name: set up goose
        uses: mscno/setup-goose@v1
      - name: Show go version
        run: ./scripts/buildprod.sh
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'
      - name: 'Google cloud build'
        run: 'gcloud builds submit --tag europe-central2-docker.pkg.dev/notely-490021/notely-ar-repo/notely:latest --gcs-source-staging-dir=gs://notely-490021-cloudbuild/source .'
      - name: 'Create migrations'
        run: './scripts/migrateup.sh'
      - name: Deploy to Cloud Run
        run: 'gcloud run deploy notely --image europe-central2-docker.pkg.dev/notely-490021/notely-ar-repo/notely:latest --region europe-central2 --allow-unauthenticated --project notely-490021 --max-instances=4'

      
